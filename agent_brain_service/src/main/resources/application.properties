spring.application.name=agent-brain-service
server.port=8080
spring.main.allow-bean-definition-overriding=true

# CRITICAL FIX: No slash (/) at the end of this line!
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai

# Paste your NEW AIza key here (No quotes, no spaces)
spring.ai.openai.api-key=${GEMINI_API_KEY:dummy_key_for_local_testing_bypass}


# Model Name
spring.ai.openai.chat.options.model=gemini-2.5-flash
spring.ai.openai.chat.options.temperature=0.7

# ============ Gmail SMTP — Email OTP Verification ============
# Set these as environment variables or replace with real values
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USERNAME:your-email@gmail.com}

# ============ Stripe — Payment Integration ============
stripe.api.key=${STRIPE_SECRET_KEY}
stripe.success-url=http://localhost:5173/payment-success
stripe.cancel-url=http://localhost:5173